name: Android Web RDP for iPhone

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Virtualizatsiya va KVM tizimini sozlash
      run: |
        sudo apt-get update
        sudo apt-get install -y qemu-kvm libvirt-daemon-system libvirt-clients bridge-utils jq curl
        sudo chmod 666 /dev/kvm

    - name: Ngrok o'rnatish
      run: |
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt-get update && sudo apt-get install ngrok -y
        ngrok config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"

    - name: Rootlangan Android (Web-VNC) yuklash
      run: |
        # KVM qo'llab-quvvatlaydigan, veb-brauzer orqali ochiladigan tayyor Android emulyatori
        docker run -d -p 6080:6080 --device /dev/kvm --name android-container budtmo/docker-android:emulator_11.0

    - name: Ngrok Tunnelini yoqish (HTTP Port 6080)
      run: |
        # Veb-portni tashqi internetga chiqarish
        ngrok http 6080 --log=stdout > ngrok.log &
        echo "Android yuklanmoqda va tunnel ochilmoqda..."
        sleep 20

    - name: iPhone uchun ulanish havolasi
      run: |
        # Ngrok taqdim etgan HTTPS havolani qidirib topish
        WEB_URL=$(curl --silent http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url')
        echo "=========================================================================="
        echo "IPHONE UCHUN HAVOLA TAYYOR!"
        echo "Safaringizni oching va quyidagi havolaga kiring:"
        echo ""
        echo "$WEB_URL"
        echo ""
        echo "Eslatma: Sahifa ochilgach, Android ekrani yuklanishi uchun 1-2 daqiqa kuting."
        echo "=========================================================================="

    - name: Serverni 6 soat aktiv saqlash
      run: |
        sleep 21600
