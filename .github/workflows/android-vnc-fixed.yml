name: Android TCP VNC for iPhone

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Virtualizatsiya va KVM tizimini sozlash
      run: |
        sudo apt-get update
        sudo apt-get install -y qemu-kvm libvirt-daemon-system libvirt-clients bridge-utils jq curl
        sudo chmod 666 /dev/kvm

    - name: Ngrok o'rnatish
      run: |
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt-get update && sudo apt-get install ngrok -y
        ngrok config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"

    - name: Rootlangan Android (VNC Server) yuklash
      run: |
        # Android emulyatorining VNC grafik portini (5901) ishga tushiramiz
        docker run -d -p 5901:5901 -p 5555:5555 --device /dev/kvm --name android-container budtmo/docker-android:emulator_11.0

    - name: Ngrok TCP Tunnelini ishga tushirish (Port 5901)
      run: |
        # Brauzer (HTTP) o'rniga xatolik bermaydigan to'g'ridan-to'g'ri TCP tunnel ochamiz
        ngrok tcp 5901 --log=stdout > ngrok.log &
        echo "Android tizimi yuklanmoqda va tunnel ulanmoqda..."
        sleep 20

    - name: iPhone uchun VNC ulanish manzili
      run: |
        # Ngrok taqdim etgan va xatoliklardan xoli bo'lgan TCP manzilini logda ko'rsatish
        TCP_URL=$(curl --silent http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url' | sed 's/tcp:\/\///')
        echo "=========================================================================="
        echo "ANDROID TAYYOR!"
        echo "iPhone uchun ulanish manzili:"
        echo ""
        echo "$TCP_URL"
        echo ""
        echo "Eslatma: VNC Viewer ilovasiga kirib, faqat shu manzilni yozing."
        echo "=========================================================================="

    - name: Serverni 6 soat davomida aktiv saqlash
      run: |
        sleep 21600
