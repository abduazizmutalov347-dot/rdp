name: Android RDP Server

on:
  workflow_dispatch: # Bu tugma telefoningizdan qo'lda ishga tushirish imkonini beradi

jobs:
  run-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Android Docker konteynerini yuklash
        run: |
          docker run -d --privileged \
            -p 5900:5900 \
            --name android-root \
            budtmo/docker-android-x86-11.0

      - name: Ngrok orqali VNC portini iPhone-ga ochish
        run: |
          # Bu yerda portni tashqariga chiqarish uchun Ngrok yoki boshqa tünel o'rnatiladi
          # GitHub Actions portlarni avtomatik public qilmagani uchun tünel shart.
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.line/ngrok.list
          sudo apt-get update && sudo apt-get install ngrok
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          ngrok tcp 5900
