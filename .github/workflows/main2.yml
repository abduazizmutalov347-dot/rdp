name: Android RDP Server

on:
  workflow_dispatch: # Telefondan qo'lda ishga tushirish tugmasi

jobs:
  run-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Android Docker konteynerini yuklash (Redroid)
        run: |
          # Kerakli yadro modullarini tekshirish va yuklash
          sudo apt-get update
          sudo apt-get install -y qemu-kvm
          
          # Haqiqiy rootlangan Redroid Android 11 ni ishga tushiramiz
          docker run -d --privileged \
            --name android-root \
            -p 5900:5900 \
            redroid/redroid:11.0.0-latest

      - name: Ngrok orqali VNC portini iPhone-ga ochish
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install ngrok -y
          
          # Diqqat: NGROK_AUTH_TOKEN ni GitHub Secrets-ga kiritgan bo'lishingiz shart!
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          
          # VNC portini tashqariga uzatamiz
          ngrok tcp 5900

